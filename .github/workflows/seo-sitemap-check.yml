name: SEO Sitemap Sync Check

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  sitemap-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Pin npm to lockfile generator version
        run: npm install -g npm@11

      - name: Install dependencies
        run: npm ci

      - name: Check sitemap sync
        run: npm run seo:sitemap:check
