name: E2E (nightly)

# Playwright E2E is split out from the per-PR CI because it needs a running app
# (Convex + Clerk env) and is slower than the unit suite. This runs the
# unauthenticated `chromium` project (public pages); the authenticated specs
# require a saved storage state and are run locally via `npm run test:e2e`.
#
# Required GitHub repo secrets for this job to start the dev server:
#   VITE_CONVEX_URL, VITE_CLERK_PUBLISHABLE_KEY
# (set under Settings → Secrets and variables → Actions). Without them the
# dev server's predev env check fails — by design this job is scheduled-only
# and never blocks PR merges.

on:
  schedule:
    - cron: '0 7 * * *' # 07:00 UTC daily
  workflow_dispatch:

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run public E2E (chromium, no auth)
        run: npx playwright test --project=chromium
        env:
          CI: 'true'
          VITE_CONVEX_URL: ${{ secrets.VITE_CONVEX_URL }}
          VITE_CLERK_PUBLISHABLE_KEY: ${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
